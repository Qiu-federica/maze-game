<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labyrinth</title>
  <link rel="stylesheet" href="/src/style.css">

</head>

<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader"></div>
  </div>

  <div class="music-control">
    <button class="music-toggle" id="musicToggle" title="背景音乐开关">🔇</button>
    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
  </div>


  <div class="music-indicator" id="musicIndicator">
    <span class="icon">🎵</span>
    <span>背景音乐播放中...</span>
  </div>

  <div id="mainMenu" class="screen active">
    <div class="particles" id="particles"></div>

    <div class="menu-background" id="menuBackground"></div>

    <div class="menu-content">
      <h1 class="game-title">MAZE</h1>
      <button class="start-btn" onclick="startGame()">开始游戏</button>
    </div>
  </div>



  <div id="gameScreen" class="screen hidden">
    <div class="container">

      <head>
        <h1>MAZE</h1>
      </head>


      <div class="game-info">
        <div class="info-item">TIME: <span id="timer"> 00:00 </span></div>
        <div class="info-item">STEPS: <span id="moveCount">0</span></div>
      </div>

      <div class="canvas-container">
        <canvas id="mazeCanvas" width="600" height="600"></canvas>


        <div class="game-over" id="gameOverScreen">
          <div class="game-over-content">
            <h2>congradulation</h2>
            <p>finishi time: <span id="finalTime">00:00</span></p>
            <p>total steps: <span id="finalMoves">0</span></p>
            <button onclick="restartGame()">restart</button>
          </div>
        </div>
      </div>







      <div class="controls">
        <button onclick="restartgame()">restart</button>
        <button id="slove">slove</button>
        <button id="backToMenu">return</button>
      </div>

      <div class="instructions">
        <h3>rules: </h3>
        <p>1. just think how to get out of the maze</p>
        <p>2. if you get difficult you can click the 'slove' then the answer will come out </p>
        <p>4. 绿色是起点，红色是终点</p>
        <p>5. 点击"解决迷宫"按钮会从起点开始逐步绘制到终点的路径</p>
        <p>6. 从起点移动到终点即可通关</p>
      </div>
    </div>

  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="/audio/bgm.mp3" type="audio/mp3">
  </audio>



  <script src="src/main.js"></script>
</body>

</html>
